name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pre-commit jinja2 pyyaml jsonschema

      - name: pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: validate_templates.py
        run: python3 scripts/validate_templates.py

      - name: validate_providers_yml.py
        run: python3 scripts/validate_providers_yml.py
