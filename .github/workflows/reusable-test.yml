name: Reusable — Test Provider

on:
  workflow_call:
    inputs:
      provider_type:
        description: "Provider type: music_provider, player_provider, or plugin_provider"
        required: true
        type: string
      provider_domain:
        description: "Provider domain slug (e.g. msx_bridge) — required for symlink"
        default: ""
        type: string
      provider_path:
        description: "Relative path to provider source inside repo (e.g. provider/) — required for symlink and coverage"
        default: ""
        type: string
      manifest_path:
        description: "Path to manifest.json inside the provider repo"
        default: "provider/manifest.json"
        type: string
      autofix:
        description: "Auto-fix ruff issues and commit back to the branch"
        default: false
        type: boolean

jobs:
  # ─── Music / Plugin provider: clone upstream ma-server, symlink, run pytest + codecov ───
  test-music-provider:
    if: ${{ inputs.provider_type == 'music_provider' || inputs.provider_type == 'plugin_provider' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          repository: music-assistant/server
          ref: dev
          path: ma-server
          fetch-depth: 1
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Symlink provider
        run: |
          rm -rf "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          ln -s "$GITHUB_WORKSPACE/${{ inputs.provider_path }}" \
                "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
      - name: Run unit tests
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          pytest --durations 10 --cov-report term-missing \
            --cov=music_assistant/providers/${{ inputs.provider_domain }} \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            ${{ github.workspace }}/tests/ \
            --ignore=${{ github.workspace }}/tests/integration \
            --ignore=${{ github.workspace }}/tests/test_integration.py
        env:
          PYTHONDONTWRITEBYTECODE: "1"
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml

  # ─── Lint: always uses upstream music-assistant/server config for all provider types ───
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          repository: music-assistant/server
          ref: dev
          path: ma-server
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Auto-fix lint issues
        run: |
          uvx ruff check --fix .
          uvx ruff format .
      - name: Commit auto-fixes
        if: ${{ inputs.autofix }}
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-fix ruff"
            git push
          fi
      - name: Install dependencies
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Symlink provider
        run: |
          rm -rf "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          ln -s "$GITHUB_WORKSPACE/${{ inputs.provider_path }}" \
                "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
      - name: Symlink tests into ma-server (mirrors sync-to-fork rsync layout)
        run: |
          # Mirror the layout sync-to-fork rsync uses so mypy / pytest see
          # tests under tests/providers/<domain>/, matching how upstream
          # music-assistant/server organises its repo.
          mkdir -p "$GITHUB_WORKSPACE/ma-server/tests/providers"
          rm -rf "$GITHUB_WORKSPACE/ma-server/tests/providers/${{ inputs.provider_domain }}"
          if [ -d "$GITHUB_WORKSPACE/tests" ]; then
            ln -s "$GITHUB_WORKSPACE/tests" \
                  "$GITHUB_WORKSPACE/ma-server/tests/providers/${{ inputs.provider_domain }}"
          fi
      - name: Lint (pre-commit)
        run: |
          uv venv .lint-venv --python 3.14
          source .lint-venv/bin/activate
          uv pip install \
            pre-commit \
            ruff \
            pre-commit-hooks \
            codespell \
            mypy
          SKIP=no-commit-to-branch,mypy pre-commit run --all-files
      - name: Install mypy
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          uv pip install mypy
      - name: Type check
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          # Cover both the provider package and its tests so divergence with
          # the strict upstream mypy config (run on tests/ in
          # music-assistant/server) cannot accrue silently. The shared
          # ``[[tool.mypy.overrides]] module = "tests.*"`` entry in the
          # provider's pyproject.toml relaxes ``warn_unused_ignores`` for
          # tests, keeping the noise floor low.
          paths=(music_assistant/providers/${{ inputs.provider_domain }})
          if [ -e tests/providers/${{ inputs.provider_domain }} ]; then
            paths+=(tests/providers/${{ inputs.provider_domain }})
          fi
          mypy "${paths[@]}"

  # ─── Player provider: clone fork ma-server, symlink, pre-commit + mypy + pytest ────
  test-player-provider:
    if: ${{ inputs.provider_type == 'player_provider' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          repository: trudenboy/ma-server
          ref: dev
          path: ma-server
          fetch-depth: 1
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Symlink provider
        run: |
          rm -rf "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          ln -s "$GITHUB_WORKSPACE/${{ inputs.provider_path }}" \
                "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
      - name: Run unit tests
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          pytest --durations 10 --cov-report term-missing \
            --cov=music_assistant/providers/${{ inputs.provider_domain }} \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            ${{ github.workspace }}/tests/ \
            --ignore=${{ github.workspace }}/tests/integration \
            --ignore=${{ github.workspace }}/tests/test_integration.py
        env:
          PYTHONDONTWRITEBYTECODE: "1"
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml

  # ─── Report CI failure as a GitHub issue (with dedup) ────────────────────────
  # Split into two jobs because test jobs are conditional by provider_type;
  # GitHub fails the workflow at startup when all needs-jobs are skipped.
  report-failure-music:
    needs: [test-music-provider, lint]
    if: >-
      ${{ always() &&
          (inputs.provider_type == 'music_provider' || inputs.provider_type == 'plugin_provider') &&
          (needs.test-music-provider.result == 'failure' ||
           needs.lint.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update CI incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "CI test failure — ${{ github.ref_name }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          LABEL="incident:ci"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$LABEL" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "New failure on \`${{ github.ref_name }}\`: $RUN_URL"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")" \
              --label "$LABEL" --label "priority:high" || \
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")"
          fi

  report-failure-player:
    needs: [test-player-provider, lint]
    if: >-
      ${{ always() &&
          inputs.provider_type == 'player_provider' &&
          (needs.test-player-provider.result == 'failure' ||
           needs.lint.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update CI incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "CI test failure — ${{ github.ref_name }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          LABEL="incident:ci"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$LABEL" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "New failure on \`${{ github.ref_name }}\`: $RUN_URL"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")" \
              --label "$LABEL" --label "priority:high" || \
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")"
          fi
