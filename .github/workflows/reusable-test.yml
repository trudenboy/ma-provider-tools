name: Reusable — Test Provider

on:
  workflow_call:
    inputs:
      provider_type:
        description: "Provider type: music_provider, player_provider, or plugin_provider"
        required: true
        type: string
      provider_domain:
        description: "Provider domain slug (e.g. msx_bridge) — required for symlink"
        default: ""
        type: string
      provider_path:
        description: "Relative path to provider source inside repo (e.g. provider/) — required for symlink and coverage"
        default: ""
        type: string
      manifest_path:
        description: "Path to manifest.json inside the provider repo"
        default: "provider/manifest.json"
        type: string
      autofix:
        description: "Auto-fix ruff issues and commit back to the branch"
        default: false
        type: boolean

jobs:
  # ─── Music / Plugin provider: clone upstream ma-server, symlink, run pytest + codecov ───
  test-music-provider:
    if: ${{ inputs.provider_type == 'music_provider' || inputs.provider_type == 'plugin_provider' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          repository: music-assistant/server
          ref: dev
          path: ma-server
          fetch-depth: 1
      # Auto-derive whether this provider actually needs the audio test env.
      # Music + player providers always do. Plugin providers do only if their
      # SUPPORTED_FEATURES include AUDIO_SOURCE; control-plane plugins (no
      # AUDIO_SOURCE) skip ffmpeg + heavy requirements_all.txt install. Errors
      # / unparseable cases fall through to the safe full-install path.
      - name: Detect test deps
        id: deps
        run: |
          python3 - <<'PYEOF'
          import ast, os, sys
          from pathlib import Path

          ptype = "${{ inputs.provider_type }}"
          ppath = "${{ inputs.provider_path }}".rstrip("/")

          def emit(ffmpeg: bool, full: bool) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write(f"needs_ffmpeg={'true' if ffmpeg else 'false'}\n")
                  fh.write(f"needs_ma_full_deps={'true' if full else 'false'}\n")

          # Music + player providers always need the full audio env.
          if ptype in ("music_provider", "player_provider"):
              emit(True, True); sys.exit(0)

          # Plugin providers: recursively scan all *.py under provider_path
          # for an AUDIO_SOURCE identifier/attribute reference. SUPPORTED_FEATURES
          # may live in __init__.py OR a sibling module (e.g. provider.py for
          # dlna_receiver). Docstrings / comments don't trigger AST Name/Attribute
          # nodes, so false positives are avoided.
          if not ppath or not Path(ppath).is_dir():
              emit(True, True); sys.exit(0)

          has_audio = False
          for py in Path(ppath).rglob("*.py"):
              try:
                  tree = ast.parse(py.read_text())
              except (SyntaxError, OSError):
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.Attribute) and node.attr == "AUDIO_SOURCE":
                      has_audio = True
                      break
                  if isinstance(node, ast.Name) and node.id == "AUDIO_SOURCE":
                      has_audio = True
                      break
              if has_audio:
                  break

          emit(has_audio, has_audio)
          PYEOF
      - name: Install ffmpeg
        if: ${{ steps.deps.outputs.needs_ffmpeg == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies (full — audio providers)
        if: ${{ steps.deps.outputs.needs_ma_full_deps == 'true' }}
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install dependencies (lean — control-plane plugin)
        if: ${{ steps.deps.outputs.needs_ma_full_deps != 'true' }}
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          # MA core (webserver auth helpers) imports hass_client unconditionally,
          # but the dep is only declared in the hass provider manifest /
          # requirements_all.txt. The lean path skips requirements_all.txt, so
          # pull the hass-client pin from there until upstream declares it in
          # the core dependencies.
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" \
            $(grep -i '^hass-client' requirements_all.txt || true)
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Symlink provider
        run: |
          rm -rf "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          ln -s "$GITHUB_WORKSPACE/${{ inputs.provider_path }}" \
                "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
      - name: Run unit tests
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          pytest --durations 10 --cov-report term-missing \
            --cov=music_assistant/providers/${{ inputs.provider_domain }} \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            ${{ github.workspace }}/tests/ \
            --ignore=${{ github.workspace }}/tests/integration \
            --ignore=${{ github.workspace }}/tests/test_integration.py
        env:
          PYTHONDONTWRITEBYTECODE: "1"
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml

  # ─── Lint: always uses upstream music-assistant/server config for all provider types ───
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      # Auto-fix + commit run BEFORE the ma-server checkout lands in the
      # workspace: `ruff --fix .` must never touch the upstream clone, and a
      # provider repo that tracks an `ma-server` gitlink must never get that
      # pointer (or unstageable submodule content) swept into the auto-fix
      # commit by `git add`.
      - name: Auto-fix lint issues
        run: |
          # Track upstream's ruff minor (music-assistant/server pins 0.15.x):
          # the 0.15 formatter rewrites `except (A, B):` into the PEP 758
          # `except A, B:` on target py314, matching how upstream dev formats
          # its tree. Keep in lockstep with the `ruff` pin in
          # wrappers/pyproject.toml.j2 and wrappers/.pre-commit-config.yaml.j2.
          # Scope to the provider's own code — never lint the helper
          # scripts/ (e.g. the vendored check_method_order.py) or docs.
          targets=( "${{ inputs.provider_path }}" )
          [ -d tests ] && targets+=( tests )
          uvx --from 'ruff>=0.15,<0.16' ruff check --fix "${targets[@]}"
          uvx --from 'ruff>=0.15,<0.16' ruff format "${targets[@]}"
          # Safety net: never let a formatter regression push invalid syntax.
          # Must compile with Python 3.14 (the project target): PEP 758 syntax
          # emitted by the formatter is a SyntaxError on the runner's older
          # system python3.
          changed=$(git diff --name-only -- '*.py')
          if [ -n "$changed" ]; then
            uv run --python 3.14 --no-project python -m py_compile $changed
          fi
      - name: Commit auto-fixes
        if: ${{ inputs.autofix }}
        run: |
          if ! git diff --quiet -- '*.py' '*.pyi'; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.py' '*.pyi'
            git commit -m "style: auto-fix ruff"
            git push
          fi
      - uses: actions/checkout@v4
        with:
          repository: music-assistant/server
          ref: dev
          path: ma-server
          fetch-depth: 1
      - name: Install dependencies
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Copy provider into ma-server
        run: |
          # A real copy, NOT a symlink: the upstream repo checks below walk
          # the tree with pathlib rglob / os.walk, neither of which descends
          # into symlinked directories — a symlink would silently skip the
          # provider. mypy reads the copy just the same.
          SRC="$GITHUB_WORKSPACE/${{ inputs.provider_path }}"
          DEST="$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          rsync -a "${SRC%/}/" "$DEST/"
      - name: Copy tests into ma-server (mirrors sync-to-fork rsync layout)
        run: |
          # Mirror the layout sync-to-fork rsync uses so mypy / the upstream
          # repo checks see tests under tests/providers/<domain>/, matching
          # how upstream music-assistant/server organises its repo.
          mkdir -p "$GITHUB_WORKSPACE/ma-server/tests/providers"
          rm -rf "$GITHUB_WORKSPACE/ma-server/tests/providers/${{ inputs.provider_domain }}"
          if [ -d "$GITHUB_WORKSPACE/tests" ]; then
            rsync -a "$GITHUB_WORKSPACE/tests/" \
                  "$GITHUB_WORKSPACE/ma-server/tests/providers/${{ inputs.provider_domain }}/"
          fi
      - name: Lint (pre-commit)
        run: |
          uv venv .lint-venv --python 3.14
          source .lint-venv/bin/activate
          uv pip install \
            pre-commit \
            ruff \
            pre-commit-hooks \
            codespell \
            mypy
          SKIP=no-commit-to-branch,mypy pre-commit run --all-files
      - name: Install mypy
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          uv pip install mypy
      - name: Type check
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          # Cover both the provider package and its tests so divergence with
          # the strict upstream mypy config (run on tests/ in
          # music-assistant/server) cannot accrue silently. The shared
          # ``[[tool.mypy.overrides]] module = "tests.*"`` entry in the
          # provider's pyproject.toml relaxes ``warn_unused_ignores`` for
          # tests, keeping the noise floor low.
          paths=(music_assistant/providers/${{ inputs.provider_domain }})
          if [ -e tests/providers/${{ inputs.provider_domain }} ]; then
            paths+=(tests/providers/${{ inputs.provider_domain }})
          fi
          mypy "${paths[@]}"
      - name: Upstream repo checks
        working-directory: ma-server
        env:
          DOMAIN: ${{ inputs.provider_domain }}
        run: |
          source .venv/bin/activate
          # Mirror the upstream-only pre-commit hooks that apply to
          # music_assistant/providers/** and tests/providers/** so violations
          # fail here instead of on the first upstream PR (same rationale as
          # the vendored check_method_order — ma-provider-tools#115, but
          # without a mirror: the scripts run straight from the upstream dev
          # clone with this provider's tree copied in, so the rules are
          # always upstream's current ones). A script missing at upstream
          # HEAD (renamed/removed) is skipped rather than failed.
          failed=0
          for check in \
            check_config_entries \
            check_translatable_labels \
            check_manifests \
            check_test_layout; do
            if [ ! -f "scripts/${check}.py" ]; then
              echo "::notice::scripts/${check}.py not found at upstream HEAD — skipped"
              continue
            fi
            echo "::group::${check}"
            python -m "scripts.${check}" || failed=1
            echo "::endgroup::"
          done
          # Baseline-aware checks (datetime, blocking-io, method-order,
          # icons) also exit 1 on "improvements" — when the provider repo
          # has FIXED a violation upstream's baseline still grandfathers.
          # That is not actionable here (the remedy is a baseline refresh in
          # the next upstream PR), so instead of running them verbatim:
          # regenerate each baseline, then fail only if this provider's
          # entries got WORSE (new file or higher count); improvements only
          # warn.
          BASELINE_CHECKS=""
          for check in \
            check_datetime_helpers \
            check_blocking_io \
            check_method_order \
            check_provider_icons; do
            if [ ! -f "scripts/${check}.py" ]; then
              echo "::notice::scripts/${check}.py not found at upstream HEAD — skipped"
              continue
            fi
            BASELINE_CHECKS="$BASELINE_CHECKS $check"
            python -m "scripts.${check}" --update-baseline >/dev/null
          done
          rc=0
          python3 - "$DOMAIN" <<'PYEOF' || rc=$?
          import subprocess
          import sys

          domain = sys.argv[1]
          prefixes = (
              f"music_assistant/providers/{domain}/",
              f"tests/providers/{domain}/",
          )

          def parse(text):
              # Baseline format (scripts/lint_baseline.py): sorted
              # "<path>\t<count>" lines; bare path means count 1; "#" and
              # blank lines are comments.
              counts = {}
              for raw in text.splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  path, sep, count = line.rpartition("\t")
                  counts[path if sep else line] = int(count) if sep else 1
              return counts

          changed = subprocess.run(
              ["git", "diff", "--name-only", "--", "scripts/lint_baselines/"],
              capture_output=True, text=True, check=True,
          ).stdout.split()
          regressed = False
          for f in changed:
              head = subprocess.run(
                  ["git", "show", f"HEAD:{f}"],
                  capture_output=True, text=True, check=False,
              )
              old = parse(head.stdout if head.returncode == 0 else "")
              with open(f, encoding="utf-8") as fh:
                  new = parse(fh.read())
              for path in sorted(set(old) | set(new)):
                  if not path.startswith(prefixes):
                      continue
                  before, after = old.get(path, 0), new.get(path, 0)
                  if after > before:
                      print(f"::error::{f}: {path}: {before} -> {after} violation(s)")
                      regressed = True
                  elif after < before:
                      print(
                          f"::warning::{f}: {path}: provider fixed "
                          f"{before - after} grandfathered violation(s); "
                          "refresh this baseline in the next upstream PR"
                      )
          sys.exit(2 if regressed else 0)
          PYEOF
          if [ "$rc" -eq 2 ]; then
            # Restore the pristine baselines and re-run the owning checks so
            # the log shows every violation with its message and line.
            git checkout -- scripts/lint_baselines/
            for check in $BASELINE_CHECKS; do
              echo "::group::${check}"
              python -m "scripts.${check}" || true
              echo "::endgroup::"
            done
            failed=1
          elif [ "$rc" -ne 0 ]; then
            echo "::error::baseline comparison itself failed (rc=$rc)"
            failed=1
          fi
          exit $failed

  # ─── Player provider: clone fork ma-server, symlink, pre-commit + mypy + pytest ────
  test-player-provider:
    if: ${{ inputs.provider_type == 'player_provider' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          repository: trudenboy/ma-server
          ref: dev
          path: ma-server
          fetch-depth: 1
      # Mirror of the detect step in test-music-provider — kept for uniformity
      # so plugin-vs-player edge cases never silently regress. Player providers
      # always resolve to true/true and run the full install.
      - name: Detect test deps
        id: deps
        run: |
          python3 - <<'PYEOF'
          import ast, os, sys
          from pathlib import Path

          ptype = "${{ inputs.provider_type }}"
          ppath = "${{ inputs.provider_path }}".rstrip("/")

          def emit(ffmpeg: bool, full: bool) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write(f"needs_ffmpeg={'true' if ffmpeg else 'false'}\n")
                  fh.write(f"needs_ma_full_deps={'true' if full else 'false'}\n")

          # Music + player providers always need the full audio env.
          if ptype in ("music_provider", "player_provider"):
              emit(True, True); sys.exit(0)

          # Plugin providers: recursively scan all *.py under provider_path
          # for an AUDIO_SOURCE identifier/attribute reference. SUPPORTED_FEATURES
          # may live in __init__.py OR a sibling module (e.g. provider.py for
          # dlna_receiver). Docstrings / comments don't trigger AST Name/Attribute
          # nodes, so false positives are avoided.
          if not ppath or not Path(ppath).is_dir():
              emit(True, True); sys.exit(0)

          has_audio = False
          for py in Path(ppath).rglob("*.py"):
              try:
                  tree = ast.parse(py.read_text())
              except (SyntaxError, OSError):
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.Attribute) and node.attr == "AUDIO_SOURCE":
                      has_audio = True
                      break
                  if isinstance(node, ast.Name) and node.id == "AUDIO_SOURCE":
                      has_audio = True
                      break
              if has_audio:
                  break

          emit(has_audio, has_audio)
          PYEOF
      - name: Install ffmpeg
        if: ${{ steps.deps.outputs.needs_ffmpeg == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies (full — audio providers)
        if: ${{ steps.deps.outputs.needs_ma_full_deps == 'true' }}
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" -r requirements_all.txt
      - name: Install dependencies (lean — control-plane plugin)
        if: ${{ steps.deps.outputs.needs_ma_full_deps != 'true' }}
        working-directory: ma-server
        run: |
          uv venv .venv
          source .venv/bin/activate
          # MA core (webserver auth helpers) imports hass_client unconditionally,
          # but the dep is only declared in the hass provider manifest /
          # requirements_all.txt. The lean path skips requirements_all.txt, so
          # pull the hass-client pin from there until upstream declares it in
          # the core dependencies.
          uv pip install --index-strategy unsafe-best-match -e "." -e ".[test]" \
            $(grep -i '^hass-client' requirements_all.txt || true)
      - name: Install provider dependencies
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import tomllib, subprocess, sys
          try:
              with open("pyproject.toml", "rb") as f:
                  d = tomllib.load(f)
          except FileNotFoundError:
              sys.exit(0)
          deps = d.get("project", {}).get("dependencies", [])
          if deps:
              subprocess.run(["uv", "pip", "install", "--"] + deps, check=True)
          PYEOF
      - name: Install provider runtime dependencies from manifest
        working-directory: ${{ github.workspace }}
        run: |
          source ma-server/.venv/bin/activate
          python3 << 'PYEOF'
          import json, subprocess, sys
          from pathlib import Path
          manifest = Path("${{ inputs.manifest_path }}")
          if not manifest.is_file():
              sys.exit(0)
          reqs = json.loads(manifest.read_text()).get("requirements", [])
          if reqs:
              subprocess.run(
                  ["uv", "pip", "install", "--index-strategy", "unsafe-best-match", "--"] + reqs,
                  check=True,
              )
          PYEOF
      - name: Symlink provider
        run: |
          rm -rf "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
          ln -s "$GITHUB_WORKSPACE/${{ inputs.provider_path }}" \
                "$GITHUB_WORKSPACE/ma-server/music_assistant/providers/${{ inputs.provider_domain }}"
      - name: Run unit tests
        working-directory: ma-server
        run: |
          source .venv/bin/activate
          pytest --durations 10 --cov-report term-missing \
            --cov=music_assistant/providers/${{ inputs.provider_domain }} \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            ${{ github.workspace }}/tests/ \
            --ignore=${{ github.workspace }}/tests/integration \
            --ignore=${{ github.workspace }}/tests/test_integration.py
        env:
          PYTHONDONTWRITEBYTECODE: "1"
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml

  # ─── Report CI failure as a GitHub issue (with dedup) ────────────────────────
  # Split into two jobs because test jobs are conditional by provider_type;
  # GitHub fails the workflow at startup when all needs-jobs are skipped.
  report-failure-music:
    needs: [test-music-provider, lint]
    if: >-
      ${{ always() &&
          (inputs.provider_type == 'music_provider' || inputs.provider_type == 'plugin_provider') &&
          (needs.test-music-provider.result == 'failure' ||
           needs.lint.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update CI incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "CI test failure — ${{ github.ref_name }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          LABEL="incident:ci"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$LABEL" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "New failure on \`${{ github.ref_name }}\`: $RUN_URL"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")" \
              --label "$LABEL" --label "priority:high" || \
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")"
          fi

  report-failure-player:
    needs: [test-player-provider, lint]
    if: >-
      ${{ always() &&
          inputs.provider_type == 'player_provider' &&
          (needs.test-player-provider.result == 'failure' ||
           needs.lint.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update CI incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "CI test failure — ${{ github.ref_name }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          LABEL="incident:ci"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$LABEL" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "New failure on \`${{ github.ref_name }}\`: $RUN_URL"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")" \
              --label "$LABEL" --label "priority:high" || \
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Tests failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")"
          fi
