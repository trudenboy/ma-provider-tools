name: Reusable — Sync Provider to Fork

on:
  workflow_call:
    inputs:
      manifest_path:
        description: "Path to manifest.json inside provider-repo (e.g. provider/manifest.json)"
        required: true
        type: string
      provider_path:
        description: "Source path to rsync inside provider-repo (e.g. provider/)"
        required: true
        type: string
      target_branch:
        description: "Target branch in fork (default: dev)"
        default: "dev"
        type: string
      version:
        description: "Version tag (e.g. v2.0.0) — leave empty to use latest release tag"
        default: ""
        type: string
      fork_repo:
        description: "Target fork repository (owner/repo)"
        default: "trudenboy/ma-server"
        type: string
      create_pr:
        description: "Create a PR instead of pushing directly (used for stable backports)"
        type: boolean
        default: false
      ack_upstream_ahead:
        description: "Sync even if upstream is ahead of the provider repo (override the preflight guard)"
        type: boolean
        default: false
    secrets:
      FORK_SYNC_PAT:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout provider repo
        uses: actions/checkout@v4
        with:
          path: provider-repo

      - name: Resolve version tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether target branch exists on fork
        id: branch-check
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_PAT }}
          FORK_REPO: ${{ inputs.fork_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch || 'dev' }}
        run: |
          # Distinguish three cases so auth/network errors surface loudly
          # instead of being silently treated as "branch missing":
          #   200 → branch exists, do a normal checkout
          #   404 → branch missing, bootstrap from dev
          #   anything else (401/403/5xx) → fail the job with context
          http_code=$(gh api -i "repos/${FORK_REPO}/branches/${TARGET_BRANCH}" \
                        2>/dev/null | awk '/^HTTP/ {print $2; exit}')
          case "$http_code" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unable to query ${FORK_REPO}@${TARGET_BRANCH} (HTTP ${http_code:-no-response}). Verify FORK_SYNC_PAT is valid and has access to the fork." >&2
              exit 1
              ;;
          esac

      - name: Checkout fork (existing target branch)
        if: steps.branch-check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.fork_repo }}
          path: ma-server
          token: ${{ secrets.FORK_SYNC_PAT }}
          ref: ${{ inputs.target_branch || 'dev' }}

      - name: Bootstrap target branch from dev
        if: steps.branch-check.outputs.exists == 'false'
        env:
          FORK_SYNC_PAT: ${{ secrets.FORK_SYNC_PAT }}
          FORK_REPO: ${{ inputs.fork_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git clone --depth 1 --branch dev \
            "https://x-access-token:${FORK_SYNC_PAT}@github.com/${FORK_REPO}.git" ma-server
          cd ma-server
          git checkout -b "${TARGET_BRANCH}"

      - name: Checkout tools hub (for preflight scripts)
        uses: actions/checkout@v4
        with:
          repository: trudenboy/ma-provider-tools
          path: tools-hub
          ref: main

      - name: Preflight — block if upstream is ahead
        if: ${{ !inputs.ack_upstream_ahead }}
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_PAT }}
        run: |
          set -euo pipefail
          DOMAIN=$(python3 -c "import json; print(json.load(open('provider-repo/${{ inputs.manifest_path }}'))['domain'])")
          if [ -z "$DOMAIN" ]; then
            echo "::error::Could not determine provider domain from manifest — refusing to sync (fail-closed)." >&2
            exit 1
          fi
          if ! python3 tools-hub/scripts/check_upstream_ahead.py \
                --domain "$DOMAIN" \
                --provider-path "${{ inputs.provider_path }}" \
                --provider-dir provider-repo; then
            echo "::error::Upstream music-assistant/server is ahead of this provider repo for '${DOMAIN}'." \
                 "A contributor's change would be reverted by this sync." \
                 "Run a reverse-sync first, or re-dispatch with ack_upstream_ahead=true to override." >&2
            exit 1
          fi

      - name: Sync provider files into integration/dev
        run: |
          DOMAIN=$(python3 -c "import json; print(json.load(open('provider-repo/${{ inputs.manifest_path }}'))['domain'])")
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV
          rsync -av --delete \
            provider-repo/${{ inputs.provider_path }} \
            ma-server/music_assistant/providers/${DOMAIN}/
          if [ -d "provider-repo/tests" ]; then
            # Skip doc-pinning tests that reference provider-local docs
            # (e.g. `CLAUDE.local.md`) which intentionally do not sync to
            # the integration fork or upstream — the test would FileNotFoundError
            # in the synced layout and is provider-private by design.
            rsync -av --delete --exclude='test_docs.py' \
              provider-repo/tests/ \
              ma-server/tests/providers/${DOMAIN}/
            # Rewrite every `provider`-as-import shape the provider tests use.
            # This rule set is the canonical one in scripts/_transform.py and is
            # mirrored by upstream-pr.yml.j2; tests/test_forward_sed_parity.py
            # asserts all three agree. Change all together (see issue #99).
            NEW_PKG="music_assistant.providers.${DOMAIN}"
            find ma-server/tests/providers/${DOMAIN}/ -name '*.py' -exec sed -i \
              -e "s/\\bfrom provider\\./from ${NEW_PKG}./g" \
              -e "s/\\bfrom provider import\\b/from ${NEW_PKG} import/g" \
              -e "s/\\bimport provider\\./import ${NEW_PKG}./g" \
              -e "s/\\bimport provider\\(\\s\\+as\\s\\)/import ${NEW_PKG}\\1/g" \
              -e "s/\\bimport provider\$/import ${NEW_PKG}/g" \
              -e "s/\"provider\\./\"${NEW_PKG}./g" \
              -e "s/'provider\\./'${NEW_PKG}./g" \
              {} +
          else
            echo "No tests/ directory found in provider-repo, skipping test sync."
          fi

      - name: Format synced files with ruff
        run: |
          cd ma-server
          RUFF_TARGETS="music_assistant/providers/${DOMAIN}/"
          [ -d "tests/providers/${DOMAIN}" ] && RUFF_TARGETS="$RUFF_TARGETS tests/providers/${DOMAIN}/"
          if [[ "${{ inputs.target_branch }}" == upstream/* ]]; then
            # upstream/<domain> feeds the draft PR against music-assistant/server,
            # whose dev lint enforces rules (D213, RUF012, ...) that the provider
            # repos' main-mirrored ruff.toml does not — a format-only pass leaves
            # those violations in and paints the upstream PR red until the next
            # upstream-pr.yml rebuild. Reproduce upstream's own pre-commit edits
            # instead: full autofix with upstream's exact ruff pin (read from its
            # pyproject.toml — a different ruff version resolves rules like D213
            # differently). Mirrors the fix/format pass in upstream-pr.yml.j2;
            # tests/test_ruff_pass_parity.py asserts the two stay in sync.
            RUFF_REQ=$(grep -oE 'ruff==[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml | head -1)
            pip install --quiet "${RUFF_REQ:-ruff}"
            ruff check --fix --unsafe-fixes $RUFF_TARGETS || true
          else
            pip install --quiet 'ruff<0.15'  # 0.15.x formatter emits invalid `except A, B:`
          fi
          ruff format $RUFF_TARGETS 2>/dev/null || true
          if [[ "${{ inputs.target_branch }}" == upstream/* ]]; then
            # Regenerate the Lokalise English source (translations/en.json) from the
            # synced strings.json so upstream's build_translations_source pre-commit
            # hook finds no diff. Without this, the provider's strings.json reaches
            # upstream but en.json still reflects the previous state, and the hook
            # rewrites it during the upstream `lint` job → failure (observed on the
            # fastmcp_server v0.13.3 sync). Mirrors the block in upstream-pr.yml.j2;
            # tests/test_ruff_pass_parity.py pins the canonical lines of both.
            if [ -f scripts/build_translations.py ]; then
              python3 -m pip install --quiet --break-system-packages orjson 2>/dev/null \
                || python3 -m pip install --quiet orjson 2>/dev/null || true
              python3 -m scripts.build_translations \
                || python3 scripts/build_translations.py || true
            fi
          fi

      - name: Sync VERSION file alongside manifest
        run: |
          if [ -f provider-repo/VERSION ]; then
            cp provider-repo/VERSION "ma-server/music_assistant/providers/${DOMAIN}/VERSION"
            echo "Synced VERSION file: $(cat "ma-server/music_assistant/providers/${DOMAIN}/VERSION")"
          else
            echo "No VERSION file in provider repo; skipping"
          fi

      - name: Regenerate requirements_all.txt
        run: |
          cd ma-server
          if [ -f scripts/gen_requirements_all.py ]; then
            python3 scripts/gen_requirements_all.py
            # The generator dedups first-pin-wins across all inlined
            # manifests — verify this provider's own requirements survived,
            # otherwise a sibling's conflicting pin ships a broken branch.
            python3 - "music_assistant/providers/${DOMAIN}/manifest.json" << 'REQCHECK'
          import json
          import re
          import sys

          wanted = json.load(open(sys.argv[1])).get("requirements", [])
          have = open("requirements_all.txt").read().splitlines()

          def base(spec):
              return re.split(r"[\[=<>~!]", spec, 1)[0].strip().lower()

          missing = [req for req in wanted if req not in have]
          if missing:
              print(
                  "::error::requirements_all.txt lost this provider's pin(s) "
                  "to a conflicting sibling manifest (dedup is first-pin-wins):"
              )
              for req in missing:
                  clashes = [line for line in have if base(line) == base(req)]
                  print(
                      f"::error::  manifest wants '{req}' but requirements_all.txt "
                      f"carries {clashes or 'no entry'} — align the sibling "
                      "providers' manifests on one version of the package"
                  )
              sys.exit(1)
          REQCHECK
          fi

      - name: Commit and push
        if: ${{ !inputs.create_pr }}
        run: |
          cd ma-server
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi
          TARGET="${{ inputs.target_branch || 'integration/dev' }}"
          git commit -m "feat(${{ env.DOMAIN }}): sync provider from ${{ github.event.repository.name }} ${{ steps.tag.outputs.version }}"
          # Use -u for new branches that don't exist on remote yet
          git push -u origin "HEAD:${TARGET}"

      - name: Create backport PR in fork
        if: ${{ inputs.create_pr }}
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_PAT }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_CLEAN="${VERSION%-stable}"
          BRANCH="backport/${{ env.DOMAIN }}-${VERSION_CLEAN}"
          TARGET="${{ inputs.target_branch || 'stable' }}"
          cd ma-server
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — nothing to backport"
            exit 0
          fi
          git commit -m "fix(${{ env.DOMAIN }}): backport provider from ${{ github.event.repository.name }} ${VERSION_CLEAN}"
          git push origin "$BRANCH"
          BODY=$(printf '## Backport to %s\n\n**Source**: [%s %s](https://github.com/%s/releases/tag/%s)\n\nBackport of provider code + tests.' \
            "$TARGET" \
            "${{ github.event.repository.name }}" "$VERSION" \
            "${{ github.repository }}" "$VERSION")
          gh pr create \
            --repo "${{ inputs.fork_repo }}" \
            --base "$TARGET" \
            --head "$BRANCH" \
            --title "fix(${{ env.DOMAIN }}): backport provider to ${VERSION_CLEAN}" \
            --body "$BODY" \
            --label "backport" \
            --label "${{ env.DOMAIN }}" || \
          gh pr create \
            --repo "${{ inputs.fork_repo }}" \
            --base "$TARGET" \
            --head "$BRANCH" \
            --title "fix(${{ env.DOMAIN }}): backport provider to ${VERSION_CLEAN}" \
            --body "$BODY"
          echo "PR_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Track sync in MA Ecosystem project
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_PAT }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "FORK_SYNC_PAT not set, skipping project tracking"
            exit 0
          fi
          PROJECT_ID="PVT_kwHOCFMIf84BPvYe"
          REPO_NAME="${{ github.event.repository.name }}"
          VERSION="${{ steps.tag.outputs.version }}"

          ITEM_ID=$(gh api graphql \
            -f query='mutation($pid:ID!,$title:String!){addProjectV2DraftIssue(input:{projectId:$pid,title:$title}){projectItem{id}}}' \
            -f pid="$PROJECT_ID" \
            -f title="Sync ${REPO_NAME} ${VERSION} → ${{ inputs.create_pr && inputs.target_branch || 'integration/dev' }}" \
            --jq '.data.addProjectV2DraftIssue.projectItem.id')

          gh api graphql \
            -f query='mutation($pid:ID!,$iid:ID!,$fid:ID!,$opt:String!){updateProjectV2ItemFieldValue(input:{projectId:$pid,itemId:$iid,fieldId:$fid,value:{singleSelectOptionId:$opt}}){projectV2Item{id}}}' \
            -f pid="$PROJECT_ID" -f iid="$ITEM_ID" \
            -f fid="PVTSSF_lAHOCFMIf84BPvYezg-EBfE" -f opt="3e9d1353"

  # ─── Report sync failure as a GitHub issue (with dedup) ─────────────────────
  report-failure:
    needs: [sync]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update sync incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "Sync to fork failure — ${{ github.ref_name }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          LABEL="incident:ci"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "$LABEL" \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -1)

          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "New sync failure on \`${{ github.ref_name }}\`: $RUN_URL"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Sync to fork failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")" \
              --label "$LABEL" --label "priority:high" || \
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$(printf 'Sync to fork failed on branch \`%s\`.\n\n**Run:** %s' "${{ github.ref_name }}" "$RUN_URL")"
          fi
